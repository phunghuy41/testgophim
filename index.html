<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test Typing Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Nunito:wght@700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f9c7d3;
  --card:#ffffff;
  --text:#1b4332;
  --mint:#2ec4b6;
  --wrong:#e63946;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#9ad0c2,#8ec6c5);
  color:var(--text);
}

body.dark{
  --bg:#0f2027;
  --card:#1c2b2d;
  --text:#f0fce07d;
  --mint:#52b788;
  background:#0f2027;
}

.main-wrapper{
  display:flex;
  justify-content:center;
  padding:40px;
}

.game-container{
  width:86%;
  max-width:450px;
  margin:15px auto;
}

.stats{
  display:flex;
  justify-content:space-between;
  font-weight:600;
  background:white;
  color:black;
  padding:10px 15px;
  border-radius:12px;
}

.quote{
  margin:20px 0;
  font-size:20px;
  min-height:90px;
  line-height:1.6;
  transition:0.3s ease;
}

.correct{color:var(--mint);}
.wrong{color:var(--wrong);}

textarea{
  width:100%;
  height:100px;
  font-size:18px;
  border-radius:12px;
  border:2px solid var(--mint);
  padding:10px;
  outline:none;
  resize:none;
}

.controls{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

button,select{
  padding:8px 12px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-family:inherit;
}

.leaderboard{
  margin-top:15px;
  font-size:14px;
}

.note{
  background:#e6f3ff;
  color:#008b6f;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:14px;
}

.heart{
  position:fixed;
  font-size:30px;
  animation:floatUp 2s ease forwards;
  pointer-events:none;
}

@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-120px) scale(1.8);}
}

@media(max-width:768px){
  .main-wrapper{
    padding:15px;
  }
}
@media (max-width:600px){
  .controls{
    flex-direction:column;
    gap:7px;
  }

  .controls select,
  .controls button{
    width:86%;
  }
}
</style>
</head>

<body>

<div class="main-wrapper">
  <div class="game-container">

    <div class="stats">
      ⏳ <span id="time">10:00</span>
      🔥 WPM: <span id="wpm">0</span>
      🏆 Score: <span id="score">0</span>
    </div>

    <div class="quote" id="quote"></div>

    <textarea id="input" placeholder="Bắt đầu gõ ở đây..."></textarea>

    <div class="controls">
      <select id="timeSelect">
        <option value="60">60s</option>
        <option value="120">120s</option>
      </select>
      <button onclick="toggleDark()">🌙 Dark</button>
    </div>

    <div class="leaderboard">
      <h4>🏅 Top Scores:</h4>
      <ul id="board"></ul>
    </div>

  </div>
</div>

<script>
/* ===================== QUOTES ===================== */
/* DÁN TOÀN BỘ MẢNG QUOTES CỦA BẠN VÀO ĐÂY */
const quotes = [
 `Nhà văn tồn tại ở trên đời trước hết để làm công việc giống như kẻ nâng giấc cho những người cùng đường tuyệt lộ bị cái ác hoặc số phận đen đủi dồn đến chân tường; để bênh vực cho những con người không còn ai bênh vực và để cất lên tiếng nói cho những số phận bị lãng quên. — Nguyễn Minh Châu`,

`Văn học và đời sống là hai vòng tròn đồng tâm mà tâm điểm là con người. Nhà văn nếu đánh mất con người thì cũng đồng thời đánh mất chính lý do tồn tại của văn chương. — Nguyễn Minh Châu`,

`Thơ là mở ra được một cái gì mà trước câu thơ đó, trước nhà thơ đó, vẫn như còn bị phong kín; mở ra không phải để phô bày mà để làm hiển lộ một phần linh hồn của cuộc sống. — Nguyễn Tuân`,

`Mặt trời chói lọi của trí tưởng tượng chỉ có thể cháy sáng khi được cọ xát với mặt đất của hiện thực. Trong khoảng trống rỗng của sự xa rời đời sống, nó sẽ lụi tắt. — Paustovsky`,

`Tác phẩm văn học là sự cưới xin giữa ngoại vật và nội tâm nhà văn; cái bên ngoài và cái bên trong hòa hợp với nhau thì tác phẩm mới có sinh khí và sức sống bền lâu. — Xuân Diệu`,

`Một tác phẩm thật có giá trị phải vượt lên trên tất cả những bờ cõi và giới hạn. Nó phải chứa đựng một cái gì lớn lao, mạnh mẽ, vừa đau đớn lại vừa phấn khởi; nó làm cho người gần người hơn. — Nam Cao`,

`Nhà văn không có phép thần thông để vượt ra ngoài thế giới này, nhưng thế giới ấy qua con mắt nhà văn phải mang một hình sắc riêng, phải có linh hồn riêng và tiếng nói riêng. — Hoài Thanh`,

`Tác phẩm văn học như một con quay kì lạ, chỉ có thể xuất hiện trong vận động. Muốn nó sống, phải có hành động cụ thể là sự đọc; ngoài sự đọc, nó chỉ còn là những vệt mực đen trên trang giấy trắng. — Jean-Paul Sartre`,

`Bài thơ là sợi dây truyền tình cảm cho người đọc; mỗi chữ, mỗi hình ảnh trong thơ đều phải mang trong nó một phần rung động chân thật của trái tim người viết. — Nguyễn Đình Thi`,

`Nghệ thuật là sự vươn tới, sự hướng về và sự níu giữ mãi mãi tính người cho con người trong những hoàn cảnh có thể làm con người đánh mất chính mình. — Nguyên Ngọc`,

`Cái phong phú, đa dạng vô cùng của văn học nghệ thuật là ở chỗ mỗi tác phẩm mở ra một thế giới mới lạ, không lặp lại, góp phần phản ánh muôn màu muôn vẻ của đời sống và tâm hồn con người. — Lê Đình Kỵ`,

`Tình yêu của người nghệ sĩ vừa là niềm hân hoan say mê vừa là nỗi đau đớn khắc khoải; đó là mối quan hoài thường trực về số phận và hạnh phúc của con người. — Nguyễn Minh Châu`,

`Nhà văn là người đi tìm, gắng đi tìm những hạt ngọc ẩn giấu trong bề sâu tâm hồn con người và làm cho những hạt ngọc ấy tỏa sáng trên trang viết. — Nguyễn Minh Châu`,

`Sống đã rồi hãy viết, hãy hòa mình vào cuộc sống vĩ đại của nhân dân; bởi chỉ có đời sống mới cung cấp cho nhà văn chất liệu chân thực và giàu sức lay động. — Nam Cao`,

`Chi tiết làm nên bụi vàng của tác phẩm; chính những chi tiết nhỏ bé nhưng đắt giá ấy làm nên linh hồn và sức nặng cho toàn bộ tác phẩm. — Paustovsky`,

  `Nghệ thuật không cần phải là ánh trăng lừa dối, nghệ thuật không nên là ánh trăng lừa dối. Nghệ thuật có thể chỉ là tiếng đau khổ kia, thoát ra từ những kiếp sống lầm than.” — Nam Cao`,
  `Một tác phẩm nghệ thuật phải là kết quả của tình yêu. Tình yêu con người, ước mơ cháy bỏng vì một xã hội công bằng, bình đẳng bái ái luôn luôn thôi thúc các nhà văn sống và viết, vắt cạn kiệt những dòng suy nghĩ, hiến dâng bầu máu nóng của mình cho nhân loại.” — L. Tôn-xtôi`,
  `Tác phẩm nghệ thuật sẽ chết nếu nó miêu tả cuộc sống chỉ để miêu tả, nếu nó không phải là tiếng thét khổ đau hay lời ca tụng hân hoan, nếu nó không đặt ra những câu hỏi hoặc trả lời những câu hỏi đó.” — Biêlinxki`,
  `Nếu như cảm hứng nhân bản nghiêng về đồng cảm với những khát vọng rất người của con người, cảm hứng nhân văn thiên về ngợi ca vẻ đẹp của con người thì cảm hứng nhân đạo là cảm hứng bao trùm.” — Hoài Thanh`,
  `Đối với tôi văn chương không phải là cách đem đến cho người đọc sự thoát li hay sự quên; trái lại văn chương là một thứ khí giới thanh cao và đắc lực mà chúng ta có, để vừa tố cáo và thay đổi một cái thế giới giả dối, tàn ác, vừa làm cho lòng người đọc thêm trong sạch và phong phú hơn…” — (Theo dòng, Thạch Lam)`,
  `Ở đâu có lao động thì ở đó có sáng tạo ra ngôn ngữ. Nhà văn không chỉ học tập ngôn ngữ của nhân dân mà còn là người phát triển ra ngôn ngữ sáng tạo, không nên ăn bám vào người khác. Giàu ngôn ngữ thì văn sẽ hay… Cũng cùng một vốn ngôn ngữ ấy nhưng sử dụng có sáng tạo thì văn sẽ có bề thế và kích thước. Có vốn mà không biết sử dụng chỉ như nhà giàu giữ của. Dùng chữ như đánh cờ tướng, chữ nào để chỗ nào phải đúng vị trí của nó. Văn phải linh hoạt. Văn không linh hoạt gọi là văn cứng đơ thấp khớp…” — Nguyễn Tuân`,
  `Không có gì nâng đỡ tôi suốt cuộc đời, trong những hoàn cảnh trái ngược nhất ngoài tư tưởng nghệ thuật và bổn phận của một nhà văn” — Albert Camus`,
  `Trong hoàn cảnh khắc nghiệt vừa qua, không tránh khỏi có lúc chúng ta tự hỏi, văn học để làm gì, văn học cần cho ai? Văn học có cần cho người bệnh đang giành lấy từng hơi thở tàn trong bệnh viện dã chiến? Văn học có cần cho người mẹ già đẩy chiếc xe với chút tài sản bé mọn trên đường về miền Tây? Văn học có cần cho đôi vợ chồng trẻ chở con dưới mưa gió trên đỉnh đèo Hải Vân theo đoàn người trốn dịch…” — Nhà giáo Huỳnh Như Phương`,
  `Không có tiếng nói riêng, không mang lại những điều mới mẻ cho văn chương mà chỉ giẫm theo đường mòn thì tác phẩm nghệ thuật sẽ chết.” — Leonit Leonop`,
  `Một tác phẩm thật có giá trị, phải vượt lên bên trên tất cả các bờ cõi và giới hạn, phải là một tác phẩm chung cho cả loài người. Nó phải chứa đựng một cái gì lớn lao, mạnh mẽ, vừa đau đớn lại vừa phấn khởi. Nó ca tụng lòng thương, tình bác ái, sự công bình…Nó làm cho người gần người hơn.” — Nam Cao`,
  `Có thể vượt qua giới hạn lớn lao của loài người không phải bằng cách tự xóa mình đi mà bằng cách mở rộng bản sắc của chính mình.” — Tagore`,
  `Nghệ sĩ là người biết khai thác những ấn tượng riêng, chủ quan của mình, tìm thấy những ấn tượng có giá trị khái quát và làm cho những ấn tượng ấy có được hình thức riêng.” — M.Gorki`,
  `Văn học thế giới đã có trọn vẹn hai trăm năm huy hoàng của thế kỷ XIX và XX, lịch sử nhân loại đã không phụ văn học. Việc những nhà văn còn sót lại nên làm, chính là diễn xuất một cách hết sức vẻ vang vai diễn phụ của mình. Nhưng chúng ta cũng chớ quên diễn viên chính vẫn là diễn viên chính, diễn viên phụ vẫn phải diễn vai phụ mà lịch sử đã phân công. Chấp nhận sự bên lề của văn học chẳng phải một việc tồi tệ.” — Nhà văn Diêm Liên Khoa`,
  `Văn học là thế giới hoang tưởng, ảo tưởng, hão huyền trong cuộc đời thực tẻ nhạt, dung tục, của cảm xúc nhục cảm, vớ vẩn, suy đồi, là vàng trong cát, sự bất lực thê thảm. Chúng ta làm được gì khi xây những lâu đài cát trên bờ biển xanh? — Nguyễn Huy Thiệp`,
  `Tương lai chỉ thuộc về những ai nắm được phong cách” — Victor Hugo`,
  `Muốn chấn hưng nền văn chương ngày nay, phải có những tàu năng tuấn tú” — Cố Viêm Võ`,
  `Nghệ thuật không phục vụ một đảng phái nào nó chỉ phụng sự cho nỗi thống khổ và quyền tự do của con người” — Albert Camus`,
  `Sự còn lại mất đi của số phận những tác phẩm văn học cũng như những đời văn trong độ lùi thời gian bao giờ cũng ngầm chứa đựng một sự lựa chọn đầy huyền diệu và công bằng” — Nguyễn Minh Châu`,
  `Tác phẩm nghệ thuật sẽ chết nếu nó miêu tả cuộc sống chỉ để miêu tả, nếu nó không phải là tiếng thét khổ đau hay lời ca tụng hân hoan, nếu nó không đặt ra những câu hỏi hoặc trả lời những câu hỏi đó” — Belinxky`,
  `Bài thơ hay là bài thơ đọc lên không còn thấy câu thơ mà chỉ còn thấy tình người và tôi muốn thơ phải thật là gan ruột của mình” — Tố Hữu`,
  `Những chữ xơ xác nhất mà chúng ta đã nói đến cạn cùng, mất sạch tính hình tượng đối với chúng ta, những chữ ấy trong thơ ca lại lấp lánh, lại kêu giòn và tỏa hương”. — Pautopsky`,
  `Tác phẩm văn học là sự cưới xin giữ ngoại vật và nội tâm nhà văn” — Xuân Diệu`,
  `Nghệ thuật không tái tạo những gì ta thấy đúng hơn là nó mở mắt cho ta” — Picasso`,
  `Khi văn xuôi đã đạt tới mức toàn Thiện Toàn Mỹ thì về bản chất nó đã thực là thơ” — Paustovsky`,
  `Mặt trời chói lọi của trí tưởng tượng chỉ có thể cháy sáng khi được cọ xát với mặt đất. Nó không thể cháy trong khoảng trống rỗng. Trong khoảng trống rỗng nó sẽ tắt” — Paustovsky`,
  `Cái phong phú đa dạng vô cùng vô tận của văn học nghệ thuật là ở chỗ: mỗi tác phẩm mở ra một thế giới mới lạ, không lặp lại, góp phần phản ánh thể hiện cái muôn màu muôn vẻ của đời sống và của tâm hồn con người” — Lê Đình Kỵ`,
  `Nghệ thuật là sự vươn tới, sự hướng về, sự níu giữ mãi mãi tính người cho con người”. — Nguyên Ngọc`,
  `Loại văn chương tột bậc của thiên hạ không ở trong cái giới hạn đóng mở kết cấu” — Nhữ Bá Sỹ`,
  `Văn học không quan tâm đến câu trả lời do nhà văn đem lại, mà quan tâm đến những câu hỏi do nhà văn đặt ra và những câu hỏi này luôn rộng hơn bất kì câu trả lời cặn kẽ nào” — Claudio Magris`,
  `Nhiệm vụ của nhà văn phải là bộ dây thần kinh để cảm ứng, phải là tay chân để cung thủ. Muốn sáng tác những tác phẩm vĩ đại cho nền văn hoá tương lai, cố nhiên rất tốt, nhưng nhà văn đầu tranh cho hiện tại, đồng thời cũng đấu tranh cho tương lai nữa, bởi vì mất hiện tại làm gì có tương lai” — Lỗ Tấn`,
  `Nhà thơ, đối với vũ trụ nhân sinh, nên bước vào bên trong mà lại nên đi ra bên ngoài. Bước vào bên trong mới có thể viết được. Đi ra bên ngoài mới có thể quan sát được. Bước vào bên trong mới có sinh khí. Đi ra bên ngoài mới đạt cao siêu” — Vương Quốc Duy đời Thanh`,
  `Ngôn ngữ của thi ca khác với ngôn ngữ của đời sống ở chỗ là nó gợi ra được những liên tưởng phong phú, khơi dậy ở tâm hồn con người những rung động sâu xa, biến những tầm thường của đời sống thành những gì lãng mạn, cao cả” — Lâm Ngữ Đường`,
  `Đời sống xanh tươi là cội nguồn sâu xa của văn học” — Goethe`,

  `Mỗi bài thơ mà hôm nay tôi trao vào tay bạn đọc thân mến là nảy sinh cùng với mầm mống trên cái cây xao động của cuộc đời đang nở hoa. Coi thường quyển sách này sẽ là tàn nhẫn bởi vì nó gắn liền khăng khít với bản thân cuộc đời tôi.” — Lorca`,
  `Ý nghĩa trong thơ tôi là do bạn đọc cho nó” — P. Valery`,
  `Đọc một câu thơ hay, ta thường có cảm giác đứng trước một bến đò gió nổi, một khao khát sang sông, một thúc đẩy lên đường hướng đến những vùng trời đẹp hơn, nhân tính hơn…” — Lê Đạt`,

/* ===================== ELEMENTS ===================== */
const quoteEl=document.getElementById("quote");
const inputEl=document.getElementById("input");
const timeEl=document.getElementById("time");
const wpmEl=document.getElementById("wpm");
const scoreEl=document.getElementById("score");
const timeSelect=document.getElementById("timeSelect");
const boardEl=document.getElementById("board");

let currentQuote="";
let timeLeft=parseInt(timeSelect.value);
let timer=null;
let totalTyped=0;
let score=0;
let started=false;
let lastIndex=-1;

const errorSound=new Audio("https://www.soundjay.com/button/beep-07.wav");

/* ===================== NORMALIZE ===================== */
function normalizeText(text){
  text=text.split("—")[0];
  return text
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

/* ===================== RANDOM QUOTE ===================== */
function randomQuote(){
  let randomIndex;
  do{
    randomIndex=Math.floor(Math.random()*quotes.length);
  }while(randomIndex===lastIndex);

  lastIndex=randomIndex;
  currentQuote=quotes[randomIndex];

  quoteEl.innerHTML=currentQuote
    .split("")
    .map(char=>`<span>${char}</span>`)
    .join("");

  inputEl.value="";
}

/* ===================== GAME ===================== */
function formatTime(seconds){
  let minutes = Math.floor(seconds / 60);
  let secs = seconds % 60;
  return `${minutes}:${secs < 10 ? "0" : ""}${secs}`;
}
function startGame(){
  if(started) return;
  started=true;

  timeLeft = 600; // 10 phút mặc định
  timeEl.textContent = formatTime(timeLeft);

  timer=setInterval(()=>{
    timeLeft--;
    timeEl.textContent=formatTime(timeLeft);
    calculateWPM();

    if(timeLeft<=0){
      clearInterval(timer);
      saveScore();
      alert("⏳ Hết giờ!\nScore: "+score+"\nWPM: "+wpmEl.textContent);
      resetGame();
    }
  },1000);
}

function resetGame(){
  started=false;
  score=0;
  totalTyped=0;
  scoreEl.textContent=0;
  wpmEl.textContent=0;
  randomQuote();
}

/* ===================== INPUT ===================== */
inputEl.addEventListener("input",()=>{
  if(!started) startGame();

  const rawInput=inputEl.value;
  const normalizedInput=normalizeText(rawInput);
  const normalizedQuote=normalizeText(currentQuote);

  const spans=quoteEl.querySelectorAll("span");
  const cleanQuoteArray=normalizedQuote.split("");
  const cleanInputArray=normalizedInput.split("");

  spans.forEach((span,i)=>{
    if(!cleanQuoteArray[i]) return;

    if(cleanInputArray[i]==null){
      span.classList.remove("correct","wrong");
    }
    else if(cleanInputArray[i]===cleanQuoteArray[i]){
      span.classList.add("correct");
      span.classList.remove("wrong");
    }
    else{
      span.classList.add("wrong");
      span.classList.remove("correct");

      if(errorSound.paused){
        errorSound.currentTime=0;
        errorSound.play();
      }
    }
  });

totalTyped = normalizedInput.length;

  if(normalizedInput===normalizedQuote){
    score++;
    scoreEl.textContent=score;
    showHearts();

    setTimeout(()=>{
      inputEl.value="";
      randomQuote();
    },1500);
  }
});

/* ===================== WPM ===================== */
function calculateWPM(){
  let minutes=(parseInt(timeSelect.value)-timeLeft)/60;
  if(minutes>0){
    let wpm=Math.round((totalTyped/5)/minutes);
    wpmEl.textContent=wpm;
  }
}

/* ===================== LEADERBOARD ===================== */
function saveScore(){
  let scores=JSON.parse(localStorage.getItem("mintScores"))||[];
  scores.push(score);
  scores.sort((a,b)=>b-a);
  scores=scores.slice(0,5);
  localStorage.setItem("mintScores",JSON.stringify(scores));
  renderBoard();
}

function renderBoard(){
  let scores=JSON.parse(localStorage.getItem("mintScores"))||[];
  boardEl.innerHTML=scores.map(s=>`<li>${s} câu</li>`).join("");
}

/* ===================== HEART EFFECT ===================== */
function showHearts(){
  for(let i=0;i<2;i++){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerText="💚";
    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.top=window.innerHeight/2+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),2000);
  }
}

/* ===================== DARK MODE ===================== */
function toggleDark(){
  document.body.classList.toggle("dark");
}

timeSelect.addEventListener("change",()=>{
  timeLeft=parseInt(timeSelect.value);
  timeEl.textContent=timeLeft;
});

  timeEl.textContent=formatTime(timeLeft);
});
